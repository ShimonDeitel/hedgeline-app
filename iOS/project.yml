name: Hedgeline
options:
  bundleIdPrefix: com.shimondeitel.hedgeline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Hedgeline:
    type: application
    platform: iOS
    sources:
      - path: Hedgeline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hedgeline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Hedgeline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  HedgelineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HedgelineTests
      - path: Hedgeline.storekit
    dependencies:
      - target: Hedgeline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hedgeline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  HedgelineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HedgelineUITests
    dependencies:
      - target: Hedgeline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hedgeline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Hedgeline:
    build:
      targets:
        Hedgeline: all
        HedgelineTests: [test]
        HedgelineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Hedgeline.storekit
    test:
      config: Debug
      storeKitConfiguration: Hedgeline.storekit
      targets:
        - HedgelineTests
        - HedgelineUITests
    archive:
      config: Release
